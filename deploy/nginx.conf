# nginx vhost for careerops.hemnaath.tech.
#
# Install path: /etc/nginx/sites-available/careerops
# Symlink:      /etc/nginx/sites-enabled/careerops -> ../sites-available/careerops
#
# HTTP Basic Auth lives here at the nginx layer — the app trusts whoever
# nginx lets through. Create the htpasswd file with:
#     sudo apt-get install apache2-utils
#     sudo htpasswd -c /etc/nginx/.careerops.htpasswd <username>
# Then `sudo nginx -t && sudo systemctl reload nginx`.
#
# TLS: run `sudo certbot --nginx -d careerops.hemnaath.tech` AFTER the
# DNS A record / CNAME has propagated to the droplet's IP.

server {
    listen 80;
    listen [::]:80;
    server_name careerops.hemnaath.tech;

    # Let certbot handle the redirect to HTTPS after it provisions a cert.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name careerops.hemnaath.tech;

    # certbot fills in ssl_certificate / ssl_certificate_key automatically.

    # Sane security defaults
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # HTTP Basic Auth — gate the whole site.
    auth_basic            "career-ops · personal";
    auth_basic_user_file  /etc/nginx/.careerops.htpasswd;

    # Body limit large enough to paste a long JD + CV in one go.
    client_max_body_size 4m;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
