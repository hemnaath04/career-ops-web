# nginx vhost for careerops.hemnaath.tech — PRE-CERTBOT HTTP-ONLY.
#
# Install path: /etc/nginx/sites-available/careerops
# Symlink:      /etc/nginx/sites-enabled/careerops -> ../sites-available/careerops
#
# Auth: HTTP Basic Auth at the nginx layer. The app trusts whoever
# nginx lets through. Create the htpasswd file with:
#     sudo apt-get install apache2-utils
#     sudo htpasswd -c /etc/nginx/.careerops.htpasswd <username>
#
# TLS provisioning: run `sudo certbot --nginx -d careerops.hemnaath.tech`
# AFTER DNS resolves. certbot will:
#   - obtain a cert
#   - add a second `server { listen 443 ssl; ... }` block to this file
#   - add an HTTP -> HTTPS redirect to the existing block below
# We don't pre-write the 443 block because nginx -t fails on
# "no ssl_certificate is defined" before the cert exists.

server {
    listen 80;
    listen [::]:80;
    server_name careerops.hemnaath.tech;

    # HTTP Basic Auth gate
    auth_basic            "career-ops · personal";
    auth_basic_user_file  /etc/nginx/.careerops.htpasswd;

    # Body limit large enough to paste a long JD + CV
    client_max_body_size 4m;

    # Sane security defaults — certbot preserves these on the 443 block
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Let certbot's ACME challenge through without auth, otherwise renewal
    # fails the first time and every 60 days after.
    location /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/html;
    }

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # NDJSON streaming on /api/find — disable nginx's response buffering
        # and bump timeouts so we don't kill long scoring runs.
        proxy_buffering    off;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }
}
